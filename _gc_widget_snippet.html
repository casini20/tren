<!-- GC_WIDGET_MARKER: TREN GLOBAL CHAT WIDGET (v4 — terminal-styled redesign)
  Uses 'tren_session' directly for auth (access_token + user info).
  Visual language: ticker-style sender tags, monospace timestamps,
  grouped consecutive messages — matches the trading-terminal
  aesthetic of the rest of the dashboard instead of a generic
  messenger look.
========================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.gc-fab{
  position:fixed;bottom:20px;right:20px;z-index:900;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--al));
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 4px 18px rgba(37,99,235,.35);
  transition:transform .15s;border:none;
}
.gc-fab:hover{transform:scale(1.06);}
.gc-fab:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}
.gc-fab svg{width:21px;height:21px;fill:#fff;}
.gc-unread{
  position:absolute;top:-4px;right:-4px;background:var(--red);
  color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  padding:0 4px;font-variant-numeric:tabular-nums;
}

.gc-panel{
  position:fixed;bottom:84px;right:20px;z-index:900;
  width:368px;max-width:calc(100vw - 40px);height:492px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:16px;display:none;flex-direction:column;overflow:hidden;
  box-shadow:0 20px 56px rgba(0,0,0,.6);
  font-family:'Plus Jakarta Sans',sans-serif;
}
.gc-panel.open{display:flex;}

.gc-header{
  padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);flex-shrink:0;
}
.gc-title-wrap{display:flex;flex-direction:column;gap:1px;}
.gc-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;letter-spacing:.1px;}
.gc-live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 3px rgba(16,185,129,.16);flex-shrink:0;
}
.gc-subtitle{font-size:10px;color:var(--sub);font-variant-numeric:tabular-nums;padding-left:13px;}
.gc-close{
  background:none;border:none;color:var(--sub);cursor:pointer;
  font-size:15px;line-height:1;padding:5px;border-radius:6px;
}
.gc-close:hover{color:var(--text);background:rgba(255,255,255,.05);}
.gc-close:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}

.gc-messages{
  flex:1;overflow-y:auto;padding:14px 14px 8px;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;
}
.gc-messages::-webkit-scrollbar{width:5px;}
.gc-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}

/* ---- message group: tag + meta + one or more stacked bubbles ---- */
.gc-group{
  display:flex;gap:9px;max-width:88%;width:fit-content;
  padding:4px 6px;margin:-4px -6px;border-radius:10px;
  transition:background-color .12s;
}
.gc-group:hover{background:rgba(255,255,255,.02);}
.gc-group.mine{align-self:flex-end;flex-direction:row-reverse;}

.gc-tag{
  flex-shrink:0;width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:10.5px;font-weight:700;letter-spacing:.2px;
  border-width:1.5px;border-style:solid;margin-top:1px;
}

.gc-col{display:flex;flex-direction:column;gap:4px;min-width:0;}
.gc-group.mine .gc-col{align-items:flex-end;}

.gc-meta{display:flex;align-items:baseline;gap:7px;padding:0 1px;}
.gc-name{font-size:11.5px;font-weight:700;}
.gc-plan{
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:1px 5px;border-radius:5px;border-width:1px;border-style:solid;
  line-height:1.5;
}
.gc-plan.plan-trenbot{color:#facc15;border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.08);}
.gc-plan.plan-premium{color:#60a5fa;border-color:rgba(96,165,250,.35);background:rgba(96,165,250,.08);}
.gc-plan.plan-auto{color:#4ade80;border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.08);}
.gc-time{
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:9.5px;color:var(--sub);font-variant-numeric:tabular-nums;opacity:.75;
}

.gc-bubble{
  font-size:12.5px;line-height:1.48;color:var(--sub2);
  background:rgba(255,255,255,.045);border:1px solid var(--border);
  border-radius:9px;padding:7px 10px;word-break:break-word;
  width:fit-content;max-width:100%;
}
.gc-group.mine .gc-bubble{
  background:linear-gradient(135deg,rgba(37,99,235,.20),rgba(37,99,235,.10));
  border-color:rgba(37,99,235,.30);color:var(--text);
}
.gc-bubble + .gc-bubble{margin-top:2px;}
.gc-bubble[title]{cursor:default;}

.gc-empty{margin:auto;text-align:center;color:var(--sub);font-size:12px;padding:26px 20px;line-height:1.5;}
.gc-empty.gc-error{color:var(--red);}

.gc-input-row{
  border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;
  background:var(--bg3);flex-shrink:0;
}
.gc-input{
  flex:1;background:rgba(255,255,255,.045);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;color:var(--text);font-size:12.5px;
  font-family:inherit;resize:none;outline:none;transition:border-color .15s;
}
.gc-input:focus{border-color:rgba(37,99,235,.45);}
.gc-input::placeholder{color:var(--sub);}
.gc-send{
  width:37px;height:37px;flex-shrink:0;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--al));color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,transform .1s;
}
.gc-send:hover{opacity:.9;}
.gc-send:active{transform:scale(.93);}
.gc-send:disabled{opacity:.4;cursor:not-allowed;}
.gc-send:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.gc-send svg{width:14px;height:14px;fill:#fff;}

@media (prefers-reduced-motion: reduce){
  .gc-fab, .gc-send, .gc-group, .gc-input { transition:none !important; }
}
</style>

<button class="gc-fab" id="gc-fab" title="Global Chat" aria-label="Open global chat">
  <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
  <span class="gc-unread" id="gc-unread" style="display:none;">0</span>
</button>

<div class="gc-panel" id="gc-panel">
  <div class="gc-header">
    <div class="gc-title-wrap">
      <div class="gc-title"><span class="gc-live-dot"></span>Global Chat</div>
      <div class="gc-subtitle" id="gc-count"></div>
    </div>
    <button class="gc-close" id="gc-close" aria-label="Close chat">✕</button>
  </div>
  <div class="gc-messages" id="gc-messages">
    <div class="gc-empty">Loading messages…</div>
  </div>
  <div class="gc-input-row" id="gc-input-row">
    <textarea class="gc-input" id="gc-input" rows="1" maxlength="1000" placeholder="Message everyone…" aria-label="Message"></textarea>
    <button class="gc-send" id="gc-send" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
(function(){
  function getTrenSession(){
    try {
      const raw = localStorage.getItem('tren_session');
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed?.access_token || !parsed?.user?.id) return null;
      return parsed;
    } catch (e) {
      return null;
    }
  }

  const trenSession = getTrenSession();
  const accessToken = trenSession?.access_token || null;
  const currentUser = trenSession?.user || null;

  const REST_URL = `${SUPABASE_AUTH_URL}/rest/v1/chat_messages`;
  const SUBSCRIBERS_URL = `${SUPABASE_AUTH_URL}/rest/v1/subscribers`;

  const gcClient = window.supabase.createClient(SUPABASE_AUTH_URL, SUPABASE_AUTH_KEY);

  const fab = document.getElementById('gc-fab');
  const panel = document.getElementById('gc-panel');
  const closeBtn = document.getElementById('gc-close');
  const messagesEl = document.getElementById('gc-messages');
  const countEl = document.getElementById('gc-count');
  const input = document.getElementById('gc-input');
  const sendBtn = document.getElementById('gc-send');
  const unreadBadge = document.getElementById('gc-unread');

  let unread = 0;
  let isOpen = false;
  let myPlan = null;
  let messageCount = 0;

  // grouping state: track the last rendered sender + group element
  let lastGroupUserId = null;
  let lastGroupTimeMs = 0;
  let lastGroupEl = null;
  const GROUP_WINDOW_MS = 3 * 60 * 1000; // 3 minutes

  // ---------- helpers ----------
  const TAG_PALETTE = [
    '#2563eb', '#16a34a', '#f59e0b', '#ec4899',
    '#8b5cf6', '#06b6d4', '#ef4444', '#84cc16'
  ];

  function hashToIndex(str, mod){
    let h = 0;
    for (let i = 0; i < str.length; i++){
      h = (h * 31 + str.charCodeAt(i)) >>> 0;
    }
    return h % mod;
  }

  function tagColor(userId){
    return TAG_PALETTE[hashToIndex(userId || 'x', TAG_PALETTE.length)];
  }

  function tagCode(name){
    if (!name) return '??';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  function fmtTime(ts){
    const d = new Date(ts);
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function planBadgeHtml(plan){
    if (!plan) return '';
    const labels = { trenbot: 'TrenBot', premium: 'Premium', auto: 'AutoSignals' };
    const label = labels[plan] || plan;
    return `<span class="gc-plan plan-${plan}">${escapeHtml(label)}</span>`;
  }

  function updateCount(){
    countEl.textContent = messageCount === 1 ? '1 message' : `${messageCount} messages`;
  }

  async function lookupPlan(email){
    if (!email) return null;
    const priority = ['trenbot', 'premium', 'auto'];
    for (const plan of priority){
      try {
        const res = await fetch(
          `${SUBSCRIBERS_URL}?email=eq.${encodeURIComponent(email.toLowerCase().trim())}&plan=eq.${plan}&status=eq.active&select=plan`,
          { headers: { apikey: SUPABASE_AUTH_KEY, Authorization: `Bearer ${SUPABASE_AUTH_KEY}` } }
        );
        if (!res.ok) continue;
        const rows = await res.json();
        if (rows && rows.length > 0) return plan;
      } catch (e) { /* try next tier */ }
    }
    return null;
  }

  // ---------- rendering ----------
  function renderMessage(msg){
    const mine = currentUser && msg.user_id === currentUser.id;
    const msgTimeMs = new Date(msg.created_at).getTime();

    const sameSender = lastGroupUserId === msg.user_id;
    const withinWindow = (msgTimeMs - lastGroupTimeMs) < GROUP_WINDOW_MS;

    if (sameSender && withinWindow && lastGroupEl){
      const bubble = document.createElement('div');
      bubble.className = 'gc-bubble';
      bubble.title = fmtTime(msg.created_at);
      bubble.textContent = msg.content;
      lastGroupEl.querySelector('.gc-col').appendChild(bubble);
    } else {
      const color = tagColor(msg.user_id);
      const group = document.createElement('div');
      group.className = 'gc-group' + (mine ? ' mine' : '');
      group.innerHTML = `
        <div class="gc-tag" style="color:${color};border-color:${color}66;background:${color}14">${escapeHtml(tagCode(msg.username))}</div>
        <div class="gc-col">
          <div class="gc-meta">
            <span class="gc-name" style="color:${color}">${escapeHtml(msg.username)}</span>
            ${planBadgeHtml(msg.plan)}
            <span class="gc-time">${fmtTime(msg.created_at)}</span>
          </div>
        </div>
      `;
      const bubble = document.createElement('div');
      bubble.className = 'gc-bubble';
      bubble.textContent = msg.content;
      group.querySelector('.gc-col').appendChild(bubble);
      messagesEl.appendChild(group);

      lastGroupEl = group;
      lastGroupUserId = msg.user_id;
    }

    lastGroupTimeMs = msgTimeMs;
    messageCount++;
  }

  function scrollToBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

  function resetGroupingState(){
    lastGroupUserId = null;
    lastGroupTimeMs = 0;
    lastGroupEl = null;
    messageCount = 0;
  }

  async function loadHistory(){
    if (!accessToken){
      messagesEl.innerHTML = `<div class="gc-empty gc-error">Session not recognized — log out and back in to use chat.</div>`;
      return;
    }
    try {
      const res = await fetch(`${REST_URL}?select=*&order=created_at.asc&limit=100`, {
        headers: { apikey: SUPABASE_AUTH_KEY, Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok){
        const errText = await res.text();
        messagesEl.innerHTML = `<div class="gc-empty gc-error">Chat unavailable (${res.status}). Refresh to reconnect.</div>`;
        console.error('Global Chat load error:', errText);
        return;
      }
      const data = await res.json();
      messagesEl.innerHTML = '';
      resetGroupingState();
      if (!data || data.length === 0){
        messagesEl.innerHTML = `<div class="gc-empty">No messages yet — start the conversation.</div>`;
        updateCount();
        return;
      }
      data.forEach(renderMessage);
      updateCount();
      scrollToBottom();
    } catch (e) {
      messagesEl.innerHTML = `<div class="gc-empty gc-error">Network error. Refresh to reconnect.</div>`;
      console.error('Global Chat load exception:', e);
    }
  }

  function subscribeRealtime(){
    if (!accessToken) return;
    gcClient.realtime.setAuth(accessToken);

    gcClient
      .channel('public:chat_messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
        const empty = messagesEl.querySelector('.gc-empty');
        if (empty) empty.remove();
        renderMessage(payload.new);
        updateCount();
        scrollToBottom();
        if (!isOpen && !(currentUser && payload.new.user_id === currentUser.id)){
          unread++;
          unreadBadge.textContent = unread;
          unreadBadge.style.display = 'flex';
        }
      })
      .subscribe();
  }

  async function sendMessage(){
    const content = input.value.trim();
    if (!content) return;

    if (!accessToken || !currentUser){
      alert('Session not recognized — log out and back in to use chat.');
      return;
    }

    sendBtn.disabled = true;
    const username = currentUser.user_metadata?.username
      || currentUser.user_metadata?.full_name
      || currentUser.email?.split('@')[0]
      || 'User';

    if (myPlan === null){
      myPlan = await lookupPlan(currentUser.email) || '';
    }

    try {
      const res = await fetch(REST_URL, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_AUTH_KEY,
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({
          user_id: currentUser.id,
          username,
          content,
          plan: myPlan || null
        })
      });

      if (!res.ok){
        const errText = await res.text();
        alert('Message failed to send.');
        console.error('Global Chat send error:', errText);
      } else {
        input.value = '';
      }
    } catch (e) {
      alert('Message failed to send — check your connection.');
      console.error('Global Chat send exception:', e);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  fab.addEventListener('click', () => {
    isOpen = !isOpen;
    panel.classList.toggle('open', isOpen);
    if (isOpen){
      unread = 0;
      unreadBadge.style.display = 'none';
      scrollToBottom();
      input.focus();
    }
  });
  closeBtn.addEventListener('click', () => {
    isOpen = false;
    panel.classList.remove('open');
  });
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  loadHistory().then(subscribeRealtime);
})();
</script>
