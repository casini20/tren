<!-- GC_WIDGET_MARKER: TREN GLOBAL CHAT WIDGET
  Wired to the same Supabase auth project each page already uses
  (SUPABASE_AUTH_URL / SUPABASE_AUTH_KEY, must be defined earlier
  in this file — same as overview.html).
  Requires the "chat_messages" table + RLS policies from
  supabase_chat_setup.sql to be run once in that project.
========================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.gc-fab{
  position:fixed;bottom:20px;right:20px;z-index:900;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--al));
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 4px 18px rgba(37,99,235,.35);
  transition:transform .15s;border:none;
}
.gc-fab:hover{transform:scale(1.06);}
.gc-fab svg{width:22px;height:22px;fill:#fff;}
.gc-unread{
  position:absolute;top:-4px;right:-4px;background:var(--red);
  color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  padding:0 4px;
}
.gc-panel{
  position:fixed;bottom:84px;right:20px;z-index:900;
  width:340px;max-width:calc(100vw - 40px);height:460px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:14px;display:none;flex-direction:column;overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  font-family:'Plus Jakarta Sans',sans-serif;
}
.gc-panel.open{display:flex;}
.gc-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);flex-shrink:0;
}
.gc-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;}
.gc-live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px rgba(16,185,129,.2);}
.gc-close{background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;line-height:1;padding:4px;}
.gc-close:hover{color:var(--text);}
.gc-messages{
  flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;
}
.gc-messages::-webkit-scrollbar{width:5px;}
.gc-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
.gc-msg{display:flex;flex-direction:column;gap:2px;max-width:88%;}
.gc-msg.mine{align-self:flex-end;align-items:flex-end;}
.gc-msg-meta{font-size:10px;color:var(--sub);display:flex;gap:6px;align-items:baseline;}
.gc-msg-name{font-weight:700;color:var(--al);}
.gc-msg.mine .gc-msg-name{color:var(--green);}
.gc-msg-bubble{
  font-size:12.5px;line-height:1.4;color:var(--sub2);
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:7px 10px;word-break:break-word;
}
.gc-msg.mine .gc-msg-bubble{
  background:rgba(37,99,235,.14);border-color:rgba(37,99,235,.28);color:var(--text);
}
.gc-empty{margin:auto;text-align:center;color:var(--sub);font-size:12px;padding:20px;}
.gc-input-row{
  border-top:1px solid var(--border);padding:10px;display:flex;gap:8px;
  background:var(--bg3);flex-shrink:0;
}
.gc-input{
  flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;color:var(--text);font-size:12.5px;
  font-family:inherit;resize:none;outline:none;
}
.gc-input:focus{border-color:rgba(37,99,235,.4);}
.gc-send{
  width:36px;height:36px;flex-shrink:0;border:none;border-radius:8px;
  background:linear-gradient(90deg,var(--accent),var(--al));color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.gc-send:hover{opacity:.88;}
.gc-send:disabled{opacity:.4;cursor:not-allowed;}
.gc-send svg{width:15px;height:15px;fill:#fff;}
.gc-locked{margin:auto;text-align:center;color:var(--sub);font-size:12px;padding:24px;}
</style>

<button class="gc-fab" id="gc-fab" title="Global Chat">
  <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
  <span class="gc-unread" id="gc-unread" style="display:none;">0</span>
</button>

<div class="gc-panel" id="gc-panel">
  <div class="gc-header">
    <div class="gc-title"><span class="gc-live-dot"></span>Global Chat</div>
    <button class="gc-close" id="gc-close">✕</button>
  </div>
  <div class="gc-messages" id="gc-messages">
    <div class="gc-empty">Loading messages…</div>
  </div>
  <div class="gc-input-row" id="gc-input-row" style="display:none;">
    <textarea class="gc-input" id="gc-input" rows="1" maxlength="1000" placeholder="Message everyone…"></textarea>
    <button class="gc-send" id="gc-send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
(function(){
  const gcClient = window.supabase.createClient(SUPABASE_AUTH_URL, SUPABASE_AUTH_KEY);

  const fab = document.getElementById('gc-fab');
  const panel = document.getElementById('gc-panel');
  const closeBtn = document.getElementById('gc-close');
  const messagesEl = document.getElementById('gc-messages');
  const inputRow = document.getElementById('gc-input-row');
  const input = document.getElementById('gc-input');
  const sendBtn = document.getElementById('gc-send');
  const unreadBadge = document.getElementById('gc-unread');

  let currentUser = null;
  let unread = 0;
  let gcChannel = null;
  let isOpen = false;

  function fmtTime(ts){
    const d = new Date(ts);
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }
  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function renderMessage(msg){
    const mine = currentUser && msg.user_id === currentUser.id;
    const wrap = document.createElement('div');
    wrap.className = 'gc-msg' + (mine ? ' mine' : '');
    wrap.innerHTML = `
      <div class="gc-msg-meta"><span class="gc-msg-name">${escapeHtml(msg.username)}</span><span>${fmtTime(msg.created_at)}</span></div>
      <div class="gc-msg-bubble">${escapeHtml(msg.content)}</div>
    `;
    messagesEl.appendChild(wrap);
  }
  function scrollToBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

  async function loadHistory(){
    const { data, error } = await gcClient
      .from('chat_messages')
      .select('*')
      .order('created_at', { ascending: true })
      .limit(100);

    messagesEl.innerHTML = '';
    if (error){
      messagesEl.innerHTML = `<div class="gc-empty">Couldn't load chat: ${escapeHtml(error.message)}</div>`;
      return;
    }
    if (!data || data.length === 0){
      messagesEl.innerHTML = `<div class="gc-empty">No messages yet. Say hi 👋</div>`;
      return;
    }
    data.forEach(renderMessage);
    scrollToBottom();
  }

  function subscribeRealtime(){
    gcChannel = gcClient
      .channel('public:chat_messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
        const empty = messagesEl.querySelector('.gc-empty');
        if (empty) empty.remove();
        renderMessage(payload.new);
        scrollToBottom();
        if (!isOpen && !(currentUser && payload.new.user_id === currentUser.id)){
          unread++;
          unreadBadge.textContent = unread;
          unreadBadge.style.display = 'flex';
        }
      })
      .subscribe();
  }

  async function sendMessage(){
    const content = input.value.trim();
    if (!content || !currentUser) return;
    sendBtn.disabled = true;
    const username = currentUser.user_metadata?.username
      || currentUser.user_metadata?.full_name
      || currentUser.email?.split('@')[0]
      || 'User';

    const { error } = await gcClient.from('chat_messages').insert({
      user_id: currentUser.id,
      username,
      content
    });

    if (error){
      alert('Message failed: ' + error.message);
    } else {
      input.value = '';
    }
    sendBtn.disabled = false;
    input.focus();
  }

  async function init(){
    const { data: { session } } = await gcClient.auth.getSession();

    if (!session){
      messagesEl.innerHTML = `<div class="gc-locked">🔒 Log in to your dashboard to use Global Chat.</div>`;
      inputRow.style.display = 'none';
      return;
    }

    currentUser = session.user;
    inputRow.style.display = 'flex';
    await loadHistory();
    subscribeRealtime();

    gcClient.auth.onAuthStateChange((_event, newSession) => {
      currentUser = newSession ? newSession.user : null;
      if (!currentUser){
        inputRow.style.display = 'none';
        messagesEl.innerHTML = `<div class="gc-locked">🔒 Log in to your dashboard to use Global Chat.</div>`;
        if (gcChannel) gcClient.removeChannel(gcChannel);
      }
    });
  }

  fab.addEventListener('click', () => {
    isOpen = !isOpen;
    panel.classList.toggle('open', isOpen);
    if (isOpen){
      unread = 0;
      unreadBadge.style.display = 'none';
      scrollToBottom();
      input.focus();
    }
  });
  closeBtn.addEventListener('click', () => {
    isOpen = false;
    panel.classList.remove('open');
  });
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  init();
})();
</script>
